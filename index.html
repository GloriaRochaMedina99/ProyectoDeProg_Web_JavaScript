<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administracion de Empleados</title>
    <link rel="stylesheet" href="css/estilo.css" /> 
  </head>
  <body>
    <header>
      <h1>Panel de Administración de Empleados</h1>
      <p>Gestion de departamentos ,empleados y asistencias</p>
    </header>

    <main>
      <section id="seccion-departamentos">
        <h2>Departamentos</h2>

        <form id="form-departamento">
          <input type="hidden" id="departamento-id" />

          <input
            type="text"
            id="departamento-nombre"
            placeholder="Nombre del departamento"
          />
          <input
            type="text"
            id="departamento-responsable"
            placeholder="Responsable"
          />
          <button type="submit">Guardar departamento</button>
          <button type="button" id="btn-cancelar-departamento">Cancelar</button>
        </form>

        <div id="contenedor-departamentos"></div>
      </section>

      <section id="seccion-empleados">
        <h2>Empleados</h2>

        <form id="form-empleado">
          <input type="hidden" id="empleado-id" />

          <input
            type="text"
            id="empleado-nombre"
            placeholder="Nombre completo"
          />
          <input type="text" id="empleado-cargo" placeholder="Cargo" />
          <input type="date" id="empleado-fecha" />

          <select id="empleado-departamento">
            <option value="">Seleccione departamento</option>
          </select>

          <button type="submit">Guardar empleado</button>
          <button type="button" id="btn-cancelar-empleado">Cancelar</button>
        </form>

        <label for="filtro-departamento"
          >Filtrar empleados por departamento:</label
        >
        <select id="filtro-departamento">
          <option value="">Todos los departamentos</option>
        </select>

        <div id="contenedor-empleados"></div>
      </section>

  <section id="seccion-asistencias">
    <h2>Asistencias</h2>

    <form id="form-asistencia">
        <select id="asistencia-empleado">
            <option value="">Seleccione empleado</option>
        </select>

        <button type="submit">Registrar presente</button>
    </form>

    <label for="filtro-empleado-asistencia">Ver historial de:</label>
    <select id="filtro-empleado-asistencia">
        <option value="">Todos los empleados</option>
    </select>

    <div id="contenedor-asistencias"></div>
</section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
